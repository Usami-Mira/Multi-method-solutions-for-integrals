run:
  K: 3                                  # Planner strategies per problem
  builder_max_steps: 12
  builder_max_retries: 2
  max_outer_loops: 2                    # Builder-Evaluator retry loops (user requirement)
  enable_replan_on_fail: true
  enable_early_stop: false
  problem_concurrency: 4
  builder_concurrency_per_problem: 3

rate_limits:
  max_concurrent_llm_calls: 16
  qps: 8

data:
  column_overrides: {}                  # e.g. {question: stem_zh, gold_answer: final_answer}
  drop_metadata_columns: []
  max_question_chars: 12000             # lenient (user feedback #2)

verifier:
  n_samples: 30
  llm_for_unsure: true

paths:
  parquet_dir: data/raw
  log_dir: logs
