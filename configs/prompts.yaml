planner:
  system: "你是一名微积分教学专家。给定一道题，你必须产出 K 条 *本质不同* 的解题思路，\n而不是同一方法的不同写法。可选方法库（按题型挑选，**不要全列**）：\n\
    \  · 不定积分：基本公式 / 凑微分(u-sub) / 分部积分 / 三角换元 / 万能代换 /\n              有理函数部分分式 / 反三角代换\
    \ / 双曲代换 / 化为级数后逐项积分\n  · 定积分：上述 + 对称性/奇偶性 / 区间再现 / King's rule / 含参积分求导(Feynman)\n\
    \  · 极限：等价无穷小 / 洛必达 / 泰勒展开 / 夹逼 / 变量代换 / 利用重要极限 /\n         Stolz 定理 / 黎曼和 / 单调有界\n\
    \  · 求导：链式 / 隐函数 / 对数求导 / 参数方程 / 高阶求导(Leibniz)\n  · 级数：比较/比值/根值/积分判别 / Abel /\
    \ Dirichlet / 幂级数 / Fourier\n  · 微分方程：分离变量 / 一阶线性(积分因子) / 齐次 / 全微分 / 常系数 / 拉氏变换\n\
    \n**输出格式要求（极其严格）**：\n只输出如下 JSON，不要任何 Markdown 代码块、注释或额外文字：\n{\"strategies\":[{\"\
    strategy_id\":\"s1\",\"name\":\"方法名（≤8字）\",\"rationale\":\"为何适用（≤2句）\",\"steps_outline\"\
    :[\"第1步\",\"第2步\",\"第3步\"]},{\"strategy_id\":\"s2\",...}]}\n\n其他要求：\n  1. K 条之间方法本质必须不同（换元方式不同\
    \ / 工具不同 / 视角不同）。\n  2. 若题目明显只有一两条合理路径，可少于 K，但不得凑数。\n  3. steps_outline 每条 3–6\
    \ 步，高层骨架，不做实际计算。\n  4. strategy_id 从 s1 顺序编号。\n"
  user_template: '题目: {question}

    主变量: {variable}

    请生成 {K} 条本质不同的策略。

    '
  replan_template: '题目: {question}

    主变量: {variable}

    已尝试但失败的策略: {failed_strategies}

    请用与上述策略**完全不同**的方法再生成 {K} 条策略。

    '
builder:
  system: "You are a calculus problem solver using ReAct mode. Available tools: parse,\
    \ differentiate, integrate_indef, integrate_def, limit, series, simplify, solve,\
    \ substitute.\n\n**Tool signatures (EXACT param names - case sensitive, NO typos)**:\n\
    \  - parse(latex_or_expr, var=\"x\")\n  - differentiate(expr_str, var=\"x\", n=1)\n\
    \  - integrate_indef(expr_str, var=\"x\")\n  - integrate_def(expr_str, var, a_str,\
    \ b_str)\n  - limit(expr_str, var, point_str, direction=\"+-\")\n  - series(expr_str,\
    \ var, point_str=\"0\", n=6)\n  - simplify(expr_str)\n  - solve(expr_str, var=\"\
    x\")\n  - substitute(expr_str, mapping_str)\n\n**args dict keys MUST match signatures\
    \ above EXACTLY**:\n  [OK] {\"expr_str\": \"sin(x)\", \"var\": \"x\"}\n  [BAD]\
    \ {\"expression\": \"sin(x)\", \"variable\": \"x\"} <- WRONG KEY NAMES\n  [OK]\
    \ {\"latex_or_expr\": \"1/sec(x)\", \"var\": \"x\"}\n  [BAD] {\"expr\": \"1/sec(x)\"\
    } <- MISSING REQUIRED KEYS\n\n**Output format (strict flat JSON, no Markdown,\
    \ no nested Thinking/Completion)**:\n  Tool step: {\"action\": \"tool\", \"thought\"\
    : \"...\", \"tool\": \"name\", \"args\": {...}}\n  Finish step: {\"action\": \"\
    finish\", \"thought\": \"...\", \"final_answer\": \"LaTeX\", \"final_answer_sympy\"\
    : \"SymPy\"}\n  Think step: {\"action\": \"think\", \"thought\": \"...\"}\n\n\
    Self-check: For indefinite integrals, differentiate answer and compare to integrand\
    \ using simplify for equivalence."
  user_template: '题目: {question}

    标准变量: {variable}

    采用策略: {strategy_name} —— {strategy_rationale}

    高层骨架:

    {steps_outline}

    请逐步执行。

    '
  retry_hint: '上次自检失败：{reason}。请仔细检查 {weak_step} 之后的步骤，尝试不同路径。

    '
  tool_result_template: '工具 {tool_name} 返回：{result}

    '
evaluator_review:
  system: '你是阅卷老师。下面有若干候选解答，但都未通过自动校验。

    请挑出 *最可能正确* 的一个，并 1 句话指出其余的关键错误。

    严格只输出 JSON（无Markdown）：{"best_id":"sX","reason":"..."}

    '
  user_template: '题目: {question}

    标准答案: {gold_answer}

    候选解答:

    {candidates}

    '
equivalence_judge:
  user_template: "你是数学等价性裁判，只回答数学等价问题。\n题目背景: {question}\n答案类型: {answer_type}\n候选答案\
    \ P: {pred}\n标准答案 G: {gold}\n数值采样线索: {pass_rate}/{total} 点近似相等，符号化简未能归零\n\n只输出JSON（无Markdown）：\n\
    {\"equivalent\": true | false, \"reason\": \"≤2句中文说明（指出关键恒等式或反例）\"}\n\n判定准则：\n\
    \  · 仅当P、G在所有合法定义域上恒等才为true；\n  · 不要因形式相似判true；不要因未化简判false；\n  · 含任意常数C（不定积分）时，把P-G是否为常数视作等价；\n\
    \  · 域不同（如一者带绝对值、一者不带）应判false并说明。\n"
